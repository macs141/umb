<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UMB Online Banking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Arial:wght@400;700&display=swap');
        
        body {
            font-family: Arial, sans-serif;
            background: #f8f9fa;
        }
        
        .umb-logo {
            font-size: 2.5rem;
            font-weight: 900;
            color: #003087;
            letter-spacing: -2px;
        }
        
        .nav-green {
            height: 6px;
            background: linear-gradient(to right, #006400, #00cc00);
        }
        
        input:focus {
            border-color: #003087;
            box-shadow: 0 0 0 3px rgba(0, 48, 135, 0.2);
        }
        
        .next-btn {
            background-color: #003087;
            transition: all 0.3s;
        }
        
        .next-btn:hover {
            background-color: #002266;
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-[420px] bg-white rounded-xl shadow-2xl overflow-hidden border border-gray-200">
        <!-- Header -->
        <div class="flex items-center justify-between px-6 py-4 border-b">
            <div class="flex items-center gap-1">
                <span class="umb-logo">UMB</span>
            </div>
            <button class="text-3xl text-gray-700">☰</button>
        </div>
        
        <div class="nav-green"></div>
        
        <div class="p-6">
            <h2 class="text-2xl font-semibold text-[#003087] mb-6">
                Log in to <span class="font-bold">Online Banking:</span>
            </h2>
            
            <div class="mb-4">
                <input 
                    id="userId"
                    type="text" 
                    placeholder="User ID"
                    class="w-full px-4 py-4 border border-gray-300 rounded-lg text-lg focus:outline-none">
            </div>
            
            <a href="#" class="text-[#003087] hover:underline text-sm font-medium block mb-6">
                Forgot User ID?
            </a>
            
            <button onclick="handleNext()" 
                    class="next-btn w-full text-white py-4 rounded-lg text-xl font-bold tracking-wider">
                NEXT
            </button>
            
            <div class="mt-8 flex items-center gap-3">
                <div class="w-1.5 h-10 bg-[#003087]"></div>
                <div>
                    <p class="text-[#003087] text-lg font-medium">New User? <a href="#" class="underline">Enroll</a></p>
                    <p class="text-sm text-gray-500">Security and Privacy</p>
                </div>
            </div>
        </div>
        
        <div class="bg-[#f1f5f9] p-6">
            <h3 class="text-lg font-semibold text-gray-700 mb-4">Login to other services</h3>
            
            <div class="flex border-b border-gray-300 mb-4">
                <button onclick="switchTab(0)" id="personal-tab"
                        class="flex-1 pb-3 text-center font-bold text-[#003087] border-b-4 border-[#003087]">
                    PERSONAL
                </button>
                <button onclick="switchTab(1)" id="business-tab"
                        class="flex-1 pb-3 text-center font-bold text-gray-500">
                    BUSINESS
                </button>
            </div>
            
            <div class="space-y-4 text-[#003087]">
                <div class="flex items-center gap-3">
                    <div class="w-6 h-6 bg-white border border-gray-400 rounded flex items-center justify-center text-xs font-bold">🔒</div>
                    <span class="font-medium">Online Banking</span>
                </div>
                <div class="flex items-center gap-3">
                    <span class="font-medium">HSA/Flex Accounts</span>
                </div>
                <div class="flex items-center gap-3">
                    <span class="font-medium">CardCenter Direct</span>
                </div>
                <div class="flex items-center gap-3">
                    <span class="font-medium">Brokerage</span>
                </div>
                <div class="flex items-center gap-3">
                    <span class="font-medium">UMB 360Direct</span>
                </div>
                <div class="flex items-center gap-3">
                    <span class="font-medium">Total Wealth</span>
                </div>
            </div>
        </div>
        
        <div class="bg-[#003087] text-white text-xs py-2 px-4 flex items-center justify-between">
            <span>Give Feedback</span>
            <span class="text-2xl rotate-180">↗</span>
        </div>
    </div>

    <script>
        function handleNext() {
            const userId = document.getElementById('userId').value.trim();
            
            if (userId.toLowerCase() === "williams007") {
                window.location.href = "password.html";
            } else if (userId === "") {
                alert("Please enter your User ID to continue.");
            } else {
                alert("Invalid User ID. Please try again.");
            }
        }
        
        function switchTab(n) {
            if (n === 0) {
                document.getElementById('personal-tab').classList.add('border-b-4', 'border-[#003087]', 'text-[#003087]');
                document.getElementById('personal-tab').classList.remove('text-gray-500');
                document.getElementById('business-tab').classList.remove('border-b-4', 'border-[#003087]', 'text-[#003087]');
                document.getElementById('business-tab').classList.add('text-gray-500');
            } else {
                document.getElementById('business-tab').classList.add('border-b-4', 'border-[#003087]', 'text-[#003087]');
                document.getElementById('business-tab').classList.remove('text-gray-500');
                document.getElementById('personal-tab').classList.remove('border-b-4', 'border-[#003087]', 'text-[#003087]');
                document.getElementById('personal-tab').classList.add('text-gray-500');
            }
        }
        
        // Auto focus
        setTimeout(() => {
            document.getElementById('userId').focus();
        }, 500);
    </script>
</body>
</html>
